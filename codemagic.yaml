workflows:
  ios-testflight:
    name: HeyFlat iOS (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      # Create this in Codemagic > Personal Account > Integrations > App
      # Store Connect, using the Key ID / Issuer ID / .p8 private key from
      # App Store Connect > Users and Access > Integrations > App Store
      # Connect API. Name it exactly "heyflat-appstore" to match here.
      app_store_connect: heyflat-appstore
    environment:
      groups:
        # appstore_credentials just needs one variable: CERTIFICATE_PRIVATE_KEY
        # (a plain RSA private key Codemagic uses to generate a CSR and get a
        # new distribution certificate signed by Apple — it can't create a
        # certificate without one to pair it with).
        - appstore_credentials
        - webapp_env
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "au.com.heyflat"
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build the web app
        script: |
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $PROJECT_BUILD_NUMBER
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # false because we're only using TestFlight Internal Testing, which
        # doesn't need Apple's Beta App Review at all — true here submits
        # for that review every build, which fails while an earlier build
        # is still pending review ("Another build is in review"). The
        # build still uploads and reaches internal testers either way.
        submit_to_testflight: false
